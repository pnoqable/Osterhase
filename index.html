<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <title>Osterhase</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html {
            height: 100%;
            overflow: hidden;
        }
        body {
            background: #5BA3D9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100svh;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            padding:
                max(12px, env(safe-area-inset-top))
                12px
                max(12px, env(safe-area-inset-bottom))
                12px;
        }
        h1 {
            color: white;
            margin-bottom: 12px;
            font-size: 22px;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.4);
            letter-spacing: 1px;
        }
        #gameShell {
            position: relative;
            display: inline-block;
            --overlay-scale: 1;
        }
        canvas {
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            display: block;
        }
        p {
            color: rgba(255,255,255,0.85);
            margin-top: 10px;
            font-size: 13px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
            text-align: center;
            max-width: min(820px, calc(100vw - 24px));
            line-height: 1.4;
        }
        #settings {
            display: flex;
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 4;
            flex-direction: row;
            align-items: center;
            justify-content: flex-start;
            gap: 8px;
            background: rgba(0,0,0,0.35);
            padding: 7px 12px;
            border-radius: 12px;
            box-shadow: 0 8px 26px rgba(0,0,0,0.22);
            color: white;
            font-size: 14px;
            font-weight: 700;
            transform: scale(var(--overlay-scale));
            transform-origin: top right;
        }
        #hud {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 4;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.35);
            padding: 7px 12px;
            border-radius: 12px;
            box-shadow: 0 8px 26px rgba(0,0,0,0.22);
            color: white;
            transform: scale(var(--overlay-scale));
            transform-origin: top left;
        }
        #restartButton {
            position: absolute;
            left: 50%;
            bottom: 20%;
            z-index: 6;
            transform: translateX(-50%) scale(var(--overlay-scale));
            transform-origin: bottom center;
            min-height: 36px;
            padding: 7px 18px;
            border-radius: 999px;
            border: 2px solid rgba(255,255,255,0.34);
            background: rgba(255,255,255,0.18);
            color: white;
            font: 600 15px 'Segoe UI', Arial, sans-serif;
            box-shadow: 0 10px 26px rgba(0,0,0,0.22);
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: opacity 180ms ease;
        }
        #restartButton.visible {
            opacity: 1;
            pointer-events: auto;
        }
        #hudScore {
            font-size: 17px;
            font-weight: 700;
            white-space: nowrap;
        }
        #hudEggs {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .hudEgg {
            width: 14px;
            height: 20px;
            border-radius: 50% 50% 48% 48%;
            background: rgba(255,255,255,0.2);
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.10);
            transition: background-color 120ms ease, opacity 120ms ease;
        }
        #mobileControls {
            display: none;
        }
        body.mobile-ui #mobileControls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin-top: 10px;
            width: min(820px, calc(100vw - 24px));
        }
        .mobileControlCard {
            background: rgba(0,0,0,0.28);
            box-shadow: 0 10px 30px rgba(0,0,0,0.22);
            border: 2px solid rgba(255,255,255,0.18);
        }
        #joystickZone {
            position: relative;
            width: 108px;
            height: 108px;
            border-radius: 999px;
            touch-action: none;
            flex: 0 0 auto;
        }
        #joystickKnob {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 44px;
            height: 44px;
            border-radius: 999px;
            background: rgba(255,255,255,0.78);
            border: 2px solid rgba(255,255,255,0.88);
            transform: translate(-50%, -50%);
            box-shadow: 0 4px 14px rgba(0,0,0,0.22);
            pointer-events: none;
        }
        #jumpButton {
            min-width: 108px;
            width: 108px;
            height: 108px;
            padding: 0 18px;
            border-radius: 18px;
            color: white;
            font: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
            flex: 0 0 auto;
        }
        body.compact-ui h1,
        body.compact-ui p {
            display: none;
        }
        body.compact-ui #hud {
            top: 8px;
            left: 8px;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 10px;
        }
        body.compact-ui #hudScore {
            font-size: 14px;
        }
        body.compact-ui .hudEgg {
            width: 12px;
            height: 17px;
        }
        body.compact-ui #settings {
            top: 8px;
            right: 8px;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 10px;
        }
        body.compact-ui #settings button {
            min-height: 22px;
            padding: 2px 7px !important;
            font-size: 11px !important;
        }
        body.mobile-ui.portrait-ui #hud {
            top: 8px;
            left: 8px;
            gap: 7px;
            padding: 5px 9px;
            border-radius: 10px;
        }
        body.mobile-ui.portrait-ui #hudScore {
            font-size: 13px;
        }
        body.mobile-ui.portrait-ui #hudEggs {
            gap: 6px;
        }
        body.mobile-ui.portrait-ui .hudEgg {
            width: 11px;
            height: 16px;
        }
        body.mobile-ui.portrait-ui #settings {
            top: 8px;
            right: 8px;
            gap: 6px;
            padding: 5px 9px;
            border-radius: 10px;
            font-size: 12px;
        }
        body.mobile-ui.portrait-ui #settingsLabel {
            font-size: 12px;
        }
        body.mobile-ui.portrait-ui #strengthButtons {
            gap: 4px !important;
        }
        body.mobile-ui.portrait-ui #settings button {
            min-height: 20px;
            padding: 2px 6px !important;
            font-size: 10px !important;
        }
        #strengthButtons {
            display: flex;
            flex-direction: row;
            gap: 6px !important;
        }
        #settings button {
            width: auto;
            min-height: 24px;
            font-size: 11px;
            font-weight: 600;
            line-height: 1;
            padding: 2px 8px;
            border-radius: 999px;
            border: 2px solid rgba(255,255,255,0.24);
            color: white;
            cursor: pointer;
            font-family: inherit;
            transition: border-color 120ms ease, background-color 120ms ease, color 120ms ease, opacity 120ms ease;
        }
        #settingsLabel {
            color: rgba(255,255,255,0.88);
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }
        #btn0 {
            background: rgba(255,255,255,0.10);
            border-color: rgba(255,255,255,0.24);
        }
        #btn1 {
            background: #4a9d30;
        }
        #btn2 {
            background: #c07800;
        }
        #btn3 {
            background: #9b2020;
        }
        body.landscape-ui {
            padding-left: max(12px, env(safe-area-inset-left));
            padding-right: max(12px, env(safe-area-inset-right));
        }
        body.mobile-ui.landscape-ui #mobileControls {
            position: fixed;
            top: 50%;
            left: max(8px, env(safe-area-inset-left));
            top: calc(50% - 59px);
            flex-direction: column;
            justify-content: flex-start;
            gap: 12px;
            width: 118px;
            margin-top: 0;
            z-index: 5;
        }
        body.mobile-ui.landscape-ui #joystickZone {
            width: 118px;
            height: 118px;
        }
        body.mobile-ui.landscape-ui #jumpButton {
            position: fixed;
            top: calc(50% - 59px);
            right: max(8px, env(safe-area-inset-right));
            width: 118px;
            min-width: 118px;
            height: 118px;
            z-index: 5;
        }
        body.mobile-ui.compact-ui #mobileControls {
            margin-top: 6px;
            gap: 12px;
        }
        body.mobile-ui.compact-ui #joystickZone {
            width: 88px;
            height: 88px;
        }
        body.mobile-ui.compact-ui #joystickKnob {
            width: 36px;
            height: 36px;
        }
        body.mobile-ui.compact-ui #jumpButton {
            min-width: 88px;
            width: 88px;
            height: 88px;
            font-size: 12px;
        }
        @media (max-height: 500px) {
            body {
                padding-top: max(8px, env(safe-area-inset-top));
                padding-bottom: max(8px, env(safe-area-inset-bottom));
            }
            h1 {
                margin-bottom: 8px;
                font-size: 18px;
            }
            p {
                margin-top: 8px;
                font-size: 12px;
            }
            #settings { padding: 6px 8px; }
        }
    </style>
</head>
<body>
    <h1>Sammle alle Ostereier!</h1>
    <div id="gameShell">
        <canvas id="canvas" width="820" height="520"></canvas>
        <div id="hud">
            <span id="hudScore">Eier: 0 / 0</span>
            <div id="hudEggs"></div>
        </div>
        <div id="settings">
        <span id="settingsLabel">Explosionen:</span>
        <div id="strengthButtons" style="display:flex;gap:6px;">
                <button onclick="setExplosionMode(0)" id="btn0">Aus</button>
                <button onclick="setStrength(1)" id="btn1">Schwach</button>
                <button onclick="setStrength(2)" id="btn2">Mittel</button>
                <button onclick="setStrength(3)" id="btn3">Stark</button>
            </div>
        </div>
        <button id="restartButton" type="button">Neue Runde</button>
    </div>
    <p>Steuerung: Pfeiltasten &nbsp;|&nbsp; Sprung: Leertaste &nbsp;|&nbsp; Explosionen: Ziffertasten</p>
    <div id="mobileControls">
        <div id="joystickZone" class="mobileControlCard" aria-label="Joystick">
            <div id="joystickKnob"></div>
        </div>
        <button id="jumpButton" class="mobileControlCard" type="button">Sprung</button>
    </div>

<script>
const gameShellEl = document.getElementById('gameShell');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const titleEl = document.querySelector('h1');
const helpEl = document.querySelector('p');
const desktopHelpText = 'Steuerung: Pfeiltasten &nbsp;|&nbsp; Sprung: Leertaste &nbsp;|&nbsp; Explosionen: Ziffertasten';
const mobileHelpText = 'Funktioniert auch im Querformat';
const settingsEl = document.getElementById('settings');
const hudScoreEl = document.getElementById('hudScore');
const hudEggsEl = document.getElementById('hudEggs');
const restartButtonEl = document.getElementById('restartButton');
const mobileControlsEl = document.getElementById('mobileControls');
const joystickZoneEl = document.getElementById('joystickZone');
const joystickKnobEl = document.getElementById('joystickKnob');
const jumpButtonEl = document.getElementById('jumpButton');
const joystickInput = {
    active: false,
    dx: 0,
    dy: 0,
    pointerId: null,
};

function resetJoystick() {
    joystickInput.active = false;
    joystickInput.dx = 0;
    joystickInput.dy = 0;
    joystickInput.pointerId = null;
    joystickKnobEl.style.transform = 'translate(-50%, -50%)';
}

function resizeLayout() {
    const viewportWidth = window.visualViewport?.width ?? window.innerWidth;
    const viewportHeight = window.visualViewport?.height ?? window.innerHeight;
    const mobileUi = navigator.maxTouchPoints > 0;
    const compactUi = viewportHeight < 620 || (viewportWidth > viewportHeight && viewportHeight < 700);
    const landscapeUi = compactUi && viewportWidth > viewportHeight;
    const portraitUi = mobileUi && viewportHeight >= viewportWidth;
    const jumpButtonFloating = mobileUi && landscapeUi;
    document.body.classList.toggle('compact-ui', compactUi);
    document.body.classList.toggle('mobile-ui', mobileUi);
    document.body.classList.toggle('landscape-ui', landscapeUi);
    document.body.classList.toggle('portrait-ui', portraitUi);
    helpEl.innerHTML = mobileUi ? mobileHelpText : desktopHelpText;
    const bodyStyle = getComputedStyle(document.body);
    const titleStyle = getComputedStyle(titleEl);
    const helpStyle = getComputedStyle(helpEl);
    const mobileControlsStyle = getComputedStyle(mobileControlsEl);

    const horizontalPadding = parseFloat(bodyStyle.paddingLeft) + parseFloat(bodyStyle.paddingRight);
    const verticalPadding = parseFloat(bodyStyle.paddingTop) + parseFloat(bodyStyle.paddingBottom);
    const chromeHeight =
        titleEl.getBoundingClientRect().height +
        helpEl.getBoundingClientRect().height +
        parseFloat(titleStyle.marginBottom) +
        (landscapeUi ? 0 : mobileControlsEl.getBoundingClientRect().height) +
        parseFloat(helpStyle.marginTop) +
        (landscapeUi ? 0 : parseFloat(mobileControlsStyle.marginTop)) +
        (jumpButtonFloating ? 0 : 10);

    const leftPanelWidth = landscapeUi ? mobileControlsEl.getBoundingClientRect().width + 12 : 0;
    const rightPanelWidth = jumpButtonFloating ? jumpButtonEl.getBoundingClientRect().width + 12 : 0;
    const availableWidth = Math.max(220, viewportWidth - horizontalPadding - leftPanelWidth - rightPanelWidth);
    const availableHeight = Math.max(160, viewportHeight - verticalPadding - chromeHeight);
    const scale = Math.min(availableWidth / W, availableHeight / H, 1);
    const overlayScale = Math.max(0.68, Math.min(scale, 1));

    canvas.style.width = `${Math.floor(W * scale)}px`;
    canvas.style.height = `${Math.floor(H * scale)}px`;
    gameShellEl.style.width = canvas.style.width;
    gameShellEl.style.setProperty('--overlay-scale', overlayScale.toFixed(3));
}

window.addEventListener('resize', resizeLayout);
window.visualViewport?.addEventListener('resize', resizeLayout);
window.visualViewport?.addEventListener('scroll', resizeLayout);
requestAnimationFrame(resizeLayout);

function startLoopingJump() {
    if (bunny.looping) return;
    if (bunny.score === eggs.length) {
        bunny.celebrationJumpStarted = true;
    }
    triggerFlowerBurst(bunny.x, bunny.y);
    bunny.looping = true;
    bunny.loopProgress = 0;
}

function updateJoystickFromPointer(clientX, clientY) {
    const rect = joystickZoneEl.getBoundingClientRect();
    const radius = rect.width * 0.5;
    const knobRadius = rect.width * 0.2;
    const centerX = rect.left + radius;
    const centerY = rect.top + radius;
    let dx = clientX - centerX;
    let dy = clientY - centerY;
    const distance = Math.hypot(dx, dy);
    const maxDistance = radius - knobRadius - 6;

    if (distance > maxDistance && distance > 0) {
        const factor = maxDistance / distance;
        dx *= factor;
        dy *= factor;
    }

    joystickInput.dx = dx / maxDistance;
    joystickInput.dy = dy / maxDistance;
    joystickKnobEl.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
}

joystickZoneEl.addEventListener('pointerdown', e => {
    joystickInput.active = true;
    joystickInput.pointerId = e.pointerId;
    joystickZoneEl.setPointerCapture(e.pointerId);
    updateJoystickFromPointer(e.clientX, e.clientY);
    e.preventDefault();
});

joystickZoneEl.addEventListener('pointermove', e => {
    if (!joystickInput.active || joystickInput.pointerId !== e.pointerId) return;
    updateJoystickFromPointer(e.clientX, e.clientY);
    e.preventDefault();
});

function endJoystick(pointerId) {
    if (joystickInput.pointerId !== null && pointerId !== null && joystickInput.pointerId !== pointerId) return;
    resetJoystick();
}

joystickZoneEl.addEventListener('pointerup', e => endJoystick(e.pointerId));
joystickZoneEl.addEventListener('pointercancel', e => endJoystick(e.pointerId));
window.addEventListener('pointerup', e => endJoystick(e.pointerId));

jumpButtonEl.addEventListener('click', startLoopingJump);
jumpButtonEl.addEventListener('pointerdown', e => {
    e.preventDefault();
    startLoopingJump();
});
restartButtonEl.addEventListener('click', () => window.location.reload());

// --- Zufallsgenerator mit Seed für reproduzierbare Szene ---
let seed = Math.random(); // 42;
function rand() {
    seed = (seed * 1664525 + 1013904223) & 0xFFFFFFFF;
    return (seed >>> 0) / 0xFFFFFFFF;
}
function randRange(a, b) { return a + rand() * (b - a); }
function randInt(a, b) { return Math.floor(randRange(a, b + 1)); }

// --- Blumen ---
const flowerPalette = [
    { petal: '#FF6BA8', center: '#FFD700' },
    { petal: '#FFD700', center: '#FF8C00' },
    { petal: '#C084FC', center: '#FFD700' },
    { petal: '#F87171', center: '#FDE68A' },
    { petal: '#FD9A4A', center: '#FF4444' },
    { petal: '#FFFFFF', center: '#FFD700' },
    { petal: '#60D9FA', center: '#FFFFFF' },
];

const flowers = [];
for (let i = 0; i < 90; i++) {
    const col = flowerPalette[randInt(0, flowerPalette.length - 1)];
    flowers.push({
        x: randRange(10, W - 10),
        y: randRange(H * 0.28, H - 10),
        petalColor: col.petal,
        centerColor: col.center,
        size: randRange(6, 13),
        petals: randInt(4, 7),
        angle: rand() * Math.PI * 2,
        wobblePhase: rand() * Math.PI * 2,
        wobbleSpeed: 0.03 + rand() * 0.02,
        speedBoost: 0,
        amplitudeBoost: 0,
    });
}

// --- Wolken ---
const clouds = [
    { x: 80,  y: 55, r: 35, parts: [{dx:-25,dy:5,r:22},{dx:0,dy:0,r:30},{dx:28,dy:8,r:20},{dx:50,dy:5,r:18}] },
    { x: 320, y: 40, r: 28, parts: [{dx:-20,dy:6,r:18},{dx:0,dy:0,r:26},{dx:22,dy:7,r:16}] },
    { x: 600, y: 70, r: 32, parts: [{dx:-30,dy:6,r:20},{dx:0,dy:0,r:28},{dx:30,dy:4,r:22},{dx:55,dy:8,r:18}] },
];

// --- Ostereier ---
const eggColors = [
    { fill: '#FF6BA8', stripe: '#FF1493' },
    { fill: '#A78BFA', stripe: '#7C3AED' },
    { fill: '#34D399', stripe: '#059669' },
    { fill: '#60A5FA', stripe: '#2563EB' },
    { fill: '#FCD34D', stripe: '#F59E0B' },
    { fill: '#F87171', stripe: '#DC2626' },
    { fill: '#FB923C', stripe: '#EA580C' },
    { fill: '#C084FC', stripe: '#9333EA' },
];
const eggs = [];
const eggPositions = [];
for (let i = 0; i < 8; i++) {
    let x, y, safe;
    do {
        safe = true;
        x = randRange(50, W - 50);
        y = randRange(H * 0.35, H - 40);
        for (const p of eggPositions) {
            if (Math.hypot(x - p.x, y - p.y) < 60) { safe = false; break; }
        }
    } while (!safe);
    eggPositions.push({x, y});
    eggs.push({ x, y, col: eggColors[i], collected: false, collectAnim: 0 });
}
const sceneItems = [
    ...flowers.map(f => ({ y: f.y, draw: () => drawFlower(f) })),
    ...eggs.map(egg => ({ y: egg.y, draw: () => drawEgg(egg) })),
].sort((a, b) => a.y - b.y);

function updateHUD() {
    hudScoreEl.textContent = `Eier: ${bunny.score} / ${eggs.length}`;
    if (hudEggsEl.children.length !== eggs.length) {
        hudEggsEl.innerHTML = '';
        for (let i = 0; i < eggs.length; i++) {
            const eggEl = document.createElement('span');
            eggEl.className = 'hudEgg';
            hudEggsEl.appendChild(eggEl);
        }
    }
    for (let i = 0; i < eggs.length; i++) {
        const eggEl = hudEggsEl.children[i];
        eggEl.style.backgroundColor = eggs[i].collected ? eggColors[i].fill : 'rgba(255,255,255,0.2)';
        eggEl.style.opacity = eggs[i].collected ? '1' : '0.9';
    }
}

// --- Hase ---
const bunny = {
    x: W / 2, y: H / 2,
    speed: 3.2,
    hopPhase: 0,
    hopHeight: 0,
    facing: 1,
    verticalFacing: 1,
    tailVisible: false,
    score: 0,
    isMoving: false,
    blinkTimer: 0,
    blinking: false,
    looping: false,
    loopProgress: 0,
    celebrationJumpStarted: false,
    celebrationJumpDone: false,
    celebrationPromptAlpha: 0,
    winScreenAlpha: 0,
};

const flowerBursts = [];

function triggerFlowerBurst(x, y, options = {}) {
    flowerBursts.push({
        x,
        y,
        life: 1,
        radius: options.radius ?? 180,
        speedStrength: options.speedStrength ?? 6.5,
        amplitudeStrength: options.amplitudeStrength ?? 0.45,
        decay: options.decay ?? 0.018,
    });
}

const keys = {};
document.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.key === ' ' && !e.repeat && !bunny.looping) {
        startLoopingJump();
    }
    if (e.key === '0') {
        setExplosionMode(0);
    } else if (['1', '2', '3'].includes(e.key)) {
        setStrength(parseInt(e.key, 10));
    }
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// --- Zeichenfunktionen ---

function drawSky() {
    const g = ctx.createLinearGradient(0, 0, 0, H * 0.35);
    g.addColorStop(0, '#87CEEB');
    g.addColorStop(1, '#C9E9F5');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H * 0.35);
}

function drawGrass() {
    const g = ctx.createLinearGradient(0, H * 0.28, 0, H);
    g.addColorStop(0, '#8CCF52');
    g.addColorStop(0.4, '#6BBD38');
    g.addColorStop(1, '#4DA028');
    ctx.fillStyle = g;
    ctx.fillRect(0, H * 0.28, W, H * 0.72);

    // Hügel-Silhouette
    ctx.fillStyle = '#78C940';
    ctx.beginPath();
    ctx.moveTo(0, H * 0.36);
    ctx.bezierCurveTo(W*0.18, H*0.12, W*0.38, H*0.22, W*0.5, H*0.30);
    ctx.bezierCurveTo(W*0.63, H*0.18, W*0.82, H*0.08, W, H*0.32);
    ctx.lineTo(W, H * 0.4);
    ctx.lineTo(0, H * 0.4);
    ctx.closePath();
    ctx.fill();
}

function drawCloud(c) {
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    for (const p of c.parts) {
        ctx.beginPath();
        ctx.arc(p.dx, p.dy, p.r, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();
}

function drawFlower(f) {
    const wobble = Math.sin(f.wobblePhase) * (0.12 + f.amplitudeBoost);
    ctx.save();
    ctx.translate(f.x, f.y);

    // Stiel
    ctx.strokeStyle = '#4CAF50';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, f.size * 0.4);
    ctx.lineTo(0, f.size * 0.4 + 14);
    ctx.stroke();

    // Nur die Bluete wackelt, der Stiel bleibt fest.
    ctx.save();
    ctx.rotate(wobble);

    // Blütenblätter
    ctx.fillStyle = f.petalColor;
    for (let i = 0; i < f.petals; i++) {
        const a = f.angle + (i / f.petals) * Math.PI * 2;
        ctx.save();
        ctx.rotate(a);
        ctx.beginPath();
        ctx.ellipse(0, -f.size * 0.75, f.size * 0.38, f.size * 0.6, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    // Mitte
    ctx.fillStyle = f.centerColor;
    ctx.beginPath();
    ctx.arc(0, 0, f.size * 0.38, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.beginPath();
    ctx.arc(0, 0, f.size * 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.restore();
}

function drawEgg(egg) {
    if (egg.collected && egg.collectAnim >= 1) return;
    ctx.save();
    ctx.translate(egg.x, egg.y);

    if (egg.collected) {
        const s = 1 + egg.collectAnim * 0.8;
        ctx.scale(s, s);
        ctx.globalAlpha = 1 - egg.collectAnim;
    }

    const c = egg.col;
    // Eiform
    ctx.fillStyle = c.fill;
    ctx.beginPath();
    ctx.ellipse(0, 0, 11, 15, 0, 0, Math.PI * 2);
    ctx.fill();

    // Muster: horizontaler Streifen
    ctx.save();
    ctx.clip();
    ctx.fillStyle = c.stripe;
    ctx.globalAlpha = (egg.collected ? (1 - egg.collectAnim) : 1) * 0.5;
    ctx.fillRect(-12, -3, 24, 6);
    ctx.restore();

    // Punkte
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.globalAlpha = egg.collected ? (1 - egg.collectAnim) : 1;
    ctx.beginPath(); ctx.arc(-3, -6, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4,  4, 2, 0, Math.PI*2); ctx.fill();

    ctx.restore();
}

function drawBunnyBackView(blink) {
    ctx.fillStyle = '#ECECEC';
    ctx.beginPath(); ctx.ellipse(-9, 31, 8.5, 5.5, -0.18, 0, Math.PI * 2); ctx.fill();

    ctx.beginPath();
    ctx.ellipse(0, 13, 14, 17, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#FCFCFC';
    ctx.beginPath();
    ctx.arc(0, 15, 8.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.55)';

    for (const side of [-1, 1]) {

function drawBunnySideView(tailVisible, blink) {
    if (tailVisible) {

    ctx.ellipse(0, 10, 21, 23, 0, 0, Math.PI * 2);

    ctx.beginPath();
    ctx.ellipse(0, 14, 12, 15, 0, 0, Math.PI * 2);

    for (const side of [-1, 1]) {
        ctx.fillStyle = '#E8E8E8';

    ctx.fillStyle = '#FF69B4';

    ctx.arc(0, -11, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = '#C06070';
    ctx.lineWidth = 1.3;

    ctx.moveTo(0, -8);
    ctx.quadraticCurveTo(-4, -5, -5, -3);
    ctx.moveTo(0, -8);

    ctx.moveTo(3, -11); ctx.lineTo(20, -13);
    ctx.moveTo(-3, -11); ctx.lineTo(-20, -9);
    ctx.moveTo(-3, -11); ctx.lineTo(-20, -13);

    ctx.fillStyle = '#F0F0F0';
    ctx.beginPath(); ctx.ellipse(-10, 29, 9, 5.5, -0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( 10, 29, 9, 5.5,  0.3, 0, Math.PI * 2); ctx.fill();
}

function drawBunny(x, y, facing, verticalFacing, tailVisible, hopHeight, blink, loopAngle) {
    ctx.save();
    ctx.translate(x, y - hopHeight);
    ctx.scale(facing, 1);

    // Schatten vor der Rotation, bleibt am Boden
    const shadowScale = Math.max(0, 1 - hopHeight / 90);
    if (shadowScale > 0) {
        ctx.save();
        ctx.translate(0, hopHeight);
        ctx.fillStyle = `rgba(0,0,0,${0.18 * shadowScale})`;
        ctx.beginPath();
        ctx.ellipse(0, 28, 20 * shadowScale, 5 * shadowScale, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    if (loopAngle) {
        ctx.translate(0, -8);
        ctx.rotate(loopAngle);
        ctx.translate(0, 8);
    }

    if (verticalFacing === -1) {
        drawBunnyBackView(blink);
    } else {
        drawBunnySideView(tailVisible, blink);
    }

    ctx.restore();
}

function drawWinScreen(alpha) {

// --- Explosions-Einstellungen ---
function loadExplosionMode() {
    const storedMode = parseInt(localStorage.getItem('exp_mode') || '', 10);
    if ([0, 1, 2, 3].includes(storedMode)) return storedMode;

    const legacyEnabled = localStorage.getItem('exp_enabled');
    const legacyStrength = parseInt(localStorage.getItem('exp_strength') || '1', 10);
    if (legacyEnabled === null) return 0;
    if (legacyEnabled !== 'true') return 0;
    return [1, 2, 3].includes(legacyStrength) ? legacyStrength : 1;
}

const explosionSettings = {
    mode: loadExplosionMode(),
};

const strengthMultipliers = {
    1: { particles: 0.3, power: 0.6, shake: 0.3 },
    2: { particles: 0.65, power: 1.0, shake: 0.5 },
    3: { particles: 1.0, power: 1.4, shake: 1 },
};

function updateExplosionControls() {
    for (let i = 0; i <= 3; i++) {
        document.getElementById('btn' + i).style.border = i === explosionSettings.mode ? '2px solid white' : '2px solid transparent';
    }
}

function setExplosionMode(mode) {
    explosionSettings.mode = mode;
    localStorage.setItem('exp_mode', String(mode));
    updateExplosionControls();
}

// UI initialisieren
updateExplosionControls();

function setStrength(level) {
    setExplosionMode(level);
}

// --- Partikel ---
const particles = [];

// --- Bildschirm-Shake ---
const shake = { intensity: 0, decay: 0.85 };

function triggerShake(strength) {
    if (explosionSettings.mode === 0) return;
    const m = strengthMultipliers[explosionSettings.mode];
    shake.intensity = Math.max(shake.intensity, strength * m.shake);
}

function spawnExplosion(x, y, colors, count, power) {
    if (explosionSettings.mode === 0) return;
    const m = strengthMultipliers[explosionSettings.mode];
    count = Math.max(1, Math.round(count * m.particles));
    power = power * m.power;
    const flowerBurstProfiles = {
        1: { radius: 180, speedStrength: 7.5, amplitudeStrength: 0.55, decay: 0.015 },
        2: { radius: 240, speedStrength: 12, amplitudeStrength: 0.85, decay: 0.012 },
        3: { radius: 320, speedStrength: 22, amplitudeStrength: 1.5, decay: 0.009 },
    };
    triggerFlowerBurst(x, y, flowerBurstProfiles[explosionSettings.mode]);
    for (let i = 0; i < count; i++) {
        const angle = rand() * Math.PI * 2;
        const speed = randRange(2.5, power);
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - randRange(2, 5),
            life: 1,
            decay: randRange(0.010, 0.022),
            color: colors[randInt(0, colors.length - 1)],
            size: randRange(7, 18),
            shape: randInt(0, 1),
            rot: rand() * Math.PI,
            rotSpeed: randRange(-0.25, 0.25),
        });
    }
}

function spawnLoopingStars(x, y) {
    if (explosionSettings.mode === 0) return;
    const m = strengthMultipliers[explosionSettings.mode];
    const colors = ['#FFD700','#FF69B4','#00CFFF','#FFFFFF','#FF8C00','#C084FC'];
    const count = Math.max(1, Math.round(36 * m.particles));
    for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2;
        const speed = randRange(5, 12);
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            decay: randRange(0.012, 0.025),
            color: colors[randInt(0, colors.length - 1)],
            size: randRange(8, 16),
            shape: 2,
            rot: rand() * Math.PI,
            rotSpeed: randRange(-0.3, 0.3),
        });
    }
}

function updateAndDrawParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 0.18 * dt; // Schwerkraft
        p.life -= p.decay * dt;
        p.rot += p.rotSpeed * dt;
        if (p.life <= 0) { particles.splice(i, 1); continue; }

        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;

        if (p.shape === 0) {
            ctx.beginPath();
            ctx.arc(0, 0, p.size * 0.5, 0, Math.PI * 2);
            ctx.fill();
        } else if (p.shape === 1) {
            ctx.fillRect(-p.size * 0.4, -p.size * 0.4, p.size * 0.8, p.size * 0.8);
        } else {
            // Stern
            ctx.beginPath();
            for (let s = 0; s < 5; s++) {
                const a = (s / 5) * Math.PI * 2 - Math.PI / 2;
                const b = a + Math.PI / 5;
                const r = p.size * 0.5, ri = r * 0.45;
                s === 0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r) : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
                ctx.lineTo(Math.cos(b)*ri, Math.sin(b)*ri);
            }
            ctx.closePath();
            ctx.fill();
        }
        ctx.restore();
    }
}

// --- Feuerwerk ---
const fw = { active: false, timer: 0, nextBurst: 0, duration: 6000 };

function spawnFireworkBurst(x, y) {
    if (explosionSettings.mode === 0) return;
    const m = strengthMultipliers[explosionSettings.mode];
    const hue = randInt(0, 360);
    const colors = [
        `hsl(${hue},100%,65%)`,
        `hsl(${(hue+40)%360},100%,70%)`,
        `hsl(${(hue+80)%360},100%,75%)`,
        '#FFFFFF',
        `hsl(${(hue+160)%360},100%,60%)`,
    ];
    // Innerer Knall
    spawnExplosion(x, y, colors, 70, 13);
    // Äußerer Ring mit Sternen
    const ringCount = Math.max(1, Math.round(24 * m.particles));
    for (let i = 0; i < ringCount; i++) {
        const angle = (i / ringCount) * Math.PI * 2;
        const speed = randRange(8, 15 * m.power);
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            decay: randRange(0.008, 0.016),
            color: colors[randInt(0, colors.length - 1)],
            size: randRange(10, 20),
            shape: 2,
            rot: rand() * Math.PI,
            rotSpeed: randRange(-0.2, 0.2),
        });
    }
    triggerShake(8);
}

// --- Spielschleife ---
let lastTime = 0;
let totalTime = 0;
let loopingWasActive = false;

function loop(timestamp) {
    const raw = Math.min(timestamp - lastTime, 50);
    lastTime = timestamp;
    const dt = raw / 16.667; // normalisiert auf 60 FPS
    totalTime += raw;

    // Eingabe & Bewegung
    let dx = 0, dy = 0;
    if (keys['ArrowLeft']) dx -= 1;
    if (keys['ArrowRight']) dx += 1;
    if (keys['ArrowUp']) dy -= 1;
    if (keys['ArrowDown']) dy += 1;
    if (joystickInput.active) {
        const deadzone = 0.18;
        if (Math.hypot(joystickInput.dx, joystickInput.dy) > deadzone) {
            dx = joystickInput.dx;
            dy = joystickInput.dy;
        }
    }

    const moving = dx !== 0 || dy !== 0;
    if (moving) {
        // Diagonalbewegung normalisieren
        const len = Math.hypot(dx, dy);
        bunny.x += (dx / len) * bunny.speed * dt;
        bunny.y += (dy / len) * bunny.speed * dt;
        bunny.tailVisible = Math.abs(dx) >= Math.abs(dy);
        const upwardDominant = dy < 0 && Math.abs(dy) >= Math.abs(dx);
        const downwardDominant = dy > 0 && Math.abs(dy) >= Math.abs(dx);
        if (upwardDominant) {
            if (dx !== 0) bunny.facing = dx > 0 ? 1 : -1;
            bunny.verticalFacing = -1;
        } else if (dx !== 0) {
            bunny.facing = dx > 0 ? 1 : -1;
            bunny.verticalFacing = 0;
        } else if (downwardDominant) {
            bunny.verticalFacing = 1;
        } else if (dy < 0) {
            bunny.verticalFacing = -1;
        }
    }

    // Grenzen
    bunny.x = Math.max(28, Math.min(W - 28, bunny.x));
    bunny.y = Math.max(H * 0.28 + 35, Math.min(H - 35, bunny.y));

    // Hüpfen
    if (moving && !bunny.looping) {
        bunny.hopPhase += 0.17 * dt;
        bunny.hopHeight = Math.abs(Math.sin(bunny.hopPhase) * 20);
    } else if (!bunny.looping) {
        bunny.hopPhase = 0;
        bunny.hopHeight = Math.max(0, bunny.hopHeight - 2 * dt);
    }
    bunny.isMoving = moving;

    const flowerInfluenceRadius = 100;
    for (let i = flowerBursts.length - 1; i >= 0; i--) {
        flowerBursts[i].life -= flowerBursts[i].decay * dt;
        if (flowerBursts[i].life <= 0) {
            flowerBursts.splice(i, 1);
        }
    }
    for (const f of flowers) {
        let targetBoost = 0;
        let targetAmplitude = 0;
        if (moving) {
            const dist = Math.hypot(bunny.x - f.x, bunny.y - f.y);
            const proximity = Math.max(0, 1 - dist / flowerInfluenceRadius);
            targetBoost = proximity * 5;
            targetAmplitude = proximity * 0.36;
        }
        for (const burst of flowerBursts) {
            const dist = Math.hypot(burst.x - f.x, burst.y - f.y);
            const proximity = Math.max(0, 1 - dist / burst.radius);
            const burstInfluence = proximity * burst.life;
            targetBoost = Math.max(targetBoost, burstInfluence * burst.speedStrength);
            targetAmplitude = Math.max(targetAmplitude, burstInfluence * burst.amplitudeStrength);
        }
        const speedResponse = targetBoost > f.speedBoost ? 0.2 : 0.05;
        const amplitudeResponse = targetAmplitude > f.amplitudeBoost ? 0.18 : 0.045;
        f.speedBoost += (targetBoost - f.speedBoost) * speedResponse * dt;
        f.amplitudeBoost += (targetAmplitude - f.amplitudeBoost) * amplitudeResponse * dt;
        f.wobblePhase += f.wobbleSpeed * (1 + f.speedBoost) * dt;
    }

    // Looping-Sprung (Leertaste)
    let loopAngle = 0;
    if (bunny.looping) {
        bunny.loopProgress = Math.min(1, bunny.loopProgress + 0.026 * dt);
        loopAngle = bunny.loopProgress * Math.PI * 2;
        bunny.hopHeight = Math.sin(bunny.loopProgress * Math.PI) * 78;
        // Sterne beim höchsten Punkt (ca. 50%)
        if (!loopingWasActive) { /* kein Effekt beim Absprung */ }
        loopingWasActive = true;
        if (bunny.loopProgress >= 1) {
            bunny.looping = false;
            bunny.loopProgress = 0;
            bunny.hopHeight = 0;
            loopingWasActive = false;
            if (bunny.celebrationJumpStarted) {
                bunny.celebrationJumpDone = true;
            }
            // Landungs-Explosion
            spawnExplosion(bunny.x, bunny.y + 28,
                ['#FFD700','#FF69B4','#FFFFFF','#C084FC','#60D9FA'], 60, 10);
            triggerShake(14);
        }
    }

    // Blinzeln
    bunny.blinkTimer += dt;
    if (bunny.blinkTimer > 200) {
        bunny.blinking = true;
        if (bunny.blinkTimer > 205) {
            bunny.blinking = false;
            bunny.blinkTimer = 0;
        }
    }

    const shouldShowCelebrationPrompt = bunny.score === eggs.length && !bunny.celebrationJumpStarted;
    const celebrationPromptTarget = shouldShowCelebrationPrompt ? 1 : 0;
    bunny.celebrationPromptAlpha += (celebrationPromptTarget - bunny.celebrationPromptAlpha) * 0.12 * dt;
    if (bunny.celebrationPromptAlpha < 0.01) bunny.celebrationPromptAlpha = 0;
    if (bunny.celebrationPromptAlpha > 0.99) bunny.celebrationPromptAlpha = 1;

    const winScreenTarget = bunny.celebrationJumpDone ? 1 : 0;
    bunny.winScreenAlpha += (winScreenTarget - bunny.winScreenAlpha) * 0.08 * dt;
    if (bunny.winScreenAlpha < 0.01) bunny.winScreenAlpha = 0;
    if (bunny.winScreenAlpha > 0.99) bunny.winScreenAlpha = 1;
    restartButtonEl.classList.toggle('visible', bunny.winScreenAlpha > 0.65);

    // Eier einsammeln
    for (const egg of eggs) {
        if (!egg.collected) {
            if (Math.hypot(bunny.x - egg.x, bunny.y - egg.y) < 32) {
                egg.collected = true;
                bunny.score++;
                if (bunny.score == 5) {
                    setExplosionMode(Math.min(3, explosionSettings.mode+1));
                }
                updateHUD();
                spawnExplosion(egg.x, egg.y,
                    [egg.col.fill, egg.col.stripe, '#FFFFFF', '#FFD700'], 80, 12);
                triggerShake(10);
            }
        }
        if (egg.collected && egg.collectAnim < 1) {
            egg.collectAnim = Math.min(1, egg.collectAnim + 0.05 * dt);
        }
    }

    const t = totalTime;

    // --- Shake aktualisieren ---
    shake.intensity *= Math.pow(shake.decay, dt);
    if (shake.intensity < 0.3) shake.intensity = 0;

    // --- Render ---
    ctx.save();
    if (shake.intensity > 0) {
        const sx = (rand() - 0.5) * 2 * shake.intensity;
        const sy = (rand() - 0.5) * 2 * shake.intensity;
        ctx.translate(sx, sy);
    }
    drawSky();
    drawGrass();

    // Wolken
    for (const c of clouds) drawCloud(c);

    const bunnySortY = bunny.y + 15;
    let splitIndex = 0;
    while (splitIndex < sceneItems.length && sceneItems[splitIndex].y < bunnySortY) {
        sceneItems[splitIndex].draw();
        splitIndex++;
    }

    // Partikel (hinter Hasen)
    updateAndDrawParticles(dt);

    // Hase
    drawBunny(bunny.x, bunny.y, bunny.facing, bunny.verticalFacing, bunny.tailVisible, bunny.hopHeight, bunny.blinking, loopAngle);

    for (; splitIndex < sceneItems.length; splitIndex++) {
        sceneItems[splitIndex].draw();
    }

    ctx.restore(); // Shake-Transform beenden

    if (bunny.score === eggs.length && bunny.celebrationJumpDone) {
        // Feuerwerk starten (einmalig)
        if (!fw.active && fw.timer === 0) {
            fw.active = true;
            fw.timer = fw.duration;
            fw.nextBurst = 0;
        }
        // Feuerwerk updaten
        if (fw.active) {
            fw.timer -= raw;
            fw.nextBurst -= raw;
            if (fw.nextBurst <= 0) {
                const bx = randRange(W * 0.1, W * 0.9);
                const by = randRange(H * 0.08, H * 0.55);
                spawnFireworkBurst(bx, by);
                // Intervall wird gegen Ende kürzer (Finale!)
                const progress = 1 - fw.timer / fw.duration;
                fw.nextBurst = randRange(150, 400) * (1 - progress * 0.6);
            }
            if (fw.timer <= 0) fw.active = false;
        }
        drawWinScreen(bunny.winScreenAlpha);
    } else if (bunny.celebrationPromptAlpha > 0) {
        drawCelebrationPrompt(bunny.celebrationPromptAlpha);
    }

    requestAnimationFrame(loop);
}

updateHUD();
requestAnimationFrame(loop);
</script>
</body>
</html>
